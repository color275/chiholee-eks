apiVersion: apps/v1
kind: Deployment
metadata:
  name: order
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
        project: ecommerce
    spec:
      containers:
      - name: order
        image: color275/ecommerce-linux:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: database-env-config
        env:
        - name: HOST_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: HOST_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product
  namespace: default
spec:
  replicas: 5
  selector:
    matchLabels:
      app: product
  template:
    metadata:
      labels:
        app: product
        project: ecommerce
    spec:
      containers:
      - name: product
        image: color275/ecommerce-linux:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        resources:
          requests:
            cpu: 250m
          limits:
            cpu: 500m
        envFrom:
        - configMapRef:
            name: database-env-config
        env:
        - name: HOST_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: HOST_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: ORDER_SERVICE
          value: "order"
          # value: "172.20.229.95"

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: customer
  namespace: default
spec:
  replicas: 3
  selector:
    matchLabels:
      app: customer
  template:
    metadata:
      labels:
        app: customer
        project: ecommerce
    spec:
      containers:
      - name: customer
        image: color275/ecommerce-linux:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        envFrom:
        - configMapRef:
            name: database-env-config
        env:
        - name: HOST_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: HOST_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP


---
apiVersion: v1
kind: Service
metadata:
  name: product
  namespace: default
  annotations:
    alb.ingress.kubernetes.io/healthcheck-path: "/api/product/1"
spec:
  type: NodePort
  selector:
    app: product
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000

---

apiVersion: v1
kind: Service
metadata:
  name: order
  namespace: default
spec:
  type: ClusterIP
  selector:
    app: order
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000


---

apiVersion: v1
kind: Service
metadata:
  name: customer
  namespace: default
  annotations:
    alb.ingress.kubernetes.io/healthcheck-path: "/api/customer/1"
spec:
  type: NodePort
  selector:
    app: customer
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8000


